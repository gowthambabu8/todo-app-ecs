name: Demo github actions file
on:
    workflow_dispatch: 
        inputs:
            environment:
                description: Environment field.
                required: true
                default: "dev"
                type: choice
                options:
                    - "dev"
                    - "uat"
                    - "prod"

jobs:
    debug_job:
        runs-on: ubuntu-latest
        steps:
            -   name: print
                run: |
                    echo "Starting..."
                    echo "Ending"
                    sleep 60
            - name: print2
              run: echo "printingggg"
    output_job:
        runs-on: ubuntu-latest
        needs: debug_job
        steps:
            -   name: output name
                run: |
                    echo "Name output"
            -   name: output gender
                run: |
                    echo "Gender output"

